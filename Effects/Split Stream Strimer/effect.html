<head>
    <meta charset="UTF-8" />
    <title>Split Stream Strimer</title>

    <!-- Tham số chỉnh hiệu ứng -->
    <meta property="squareColor" label="Square color" type="color" min="0" max="360" default="#ffffff" />
    <meta property="backgroundColor" label="Background color" type="color" min="0" max="360" default="#000000" />

    <meta property="squareSize" label="Square size (length)" type="number" min="2" max="40" default="8" />
    <meta property="speed" label="Speed" type="number" min="1" max="10" default="5" />

    <meta property="rows" label="Number of rows" type="number" min="1" max="10" default="8" />

    <meta property="stripeThickness" label="Stripe thickness" type="number" min="1" max="20" default="4" />

    <meta property="direction" label="Direction" type="combobox" values="Left to Right,Right to Left" default="Left to Right" />
    <meta property="visorColor" label="Visor color" type="color" min="0" max="360" default="#ff0066" />
    <meta property="visorRandomColors" label="Visor random color" type="boolean" default="0" />
    <meta property="visorSpeed" label="Visor speed" type="number" min="0" max="100" default="30" />
    <meta property="visorTrail" label="Visor trail" type="number" min="0" max="100" default="50" />
    <meta property="visorBarWidth" label="Visor bar width" type="number" min="1" max="50" default="20" />
    <meta property="visorVertical" label="Visor vertical" type="boolean" default="1" />
</head>
<body style="margin: 0; padding: 0">
    <canvas id="myCanvas" width="320" height="200"></canvas>

    <script>
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');

        // Tham số có thể chỉnh trong UI (đồng bộ với meta)
        var squareColor = '#ffffff';
        var backgroundColor = '#000000';

        var squareSize = 8; // độ dài (theo chiều chạy)
        var speed = 5; // tốc độ di chuyển split stream (1–10)
        var rowsTop = 4; // số hàng ở nửa trên
        var rowsBottom = 6; // số hàng ở nửa dưới
        var rows = rowsTop + rowsBottom; // tổng số hàng logic
        var stripeThickness = 4; // độ dày (chiều rộng) của dải
        var direction = 'Left to Right'; // hoặc "Right to Left"
        var visorColor = '#ff0066';
        var visorRandomColors = false;
        var visorSpeed = 30;
        var visorTrail = 50;
        var visorBarWidth = 20;
        var visorVertical = true;
        var currentVisorColor = visorColor;
        var visorNegative = false;
        var visorX = 0;
        var visorY = 0;

        // Vùng hiệu ứng: chiếm 30% tổng chiều rộng canvas, sát lề trái
        function getEffectArea() {
            const areaWidth = canvas.width * 0.3;
            const areaX = 0; // sát lề trái
            const areaY = 0;
            const areaHeight = canvas.height;
            return { areaX, areaY, areaWidth, areaHeight };
        }

        function getVisorArea() {
            const areaWidth = canvas.width * 0.60;
            const areaX = canvas.width - areaWidth;
            const areaY = 0;
            const areaHeight = canvas.height;
            return { areaX, areaY, areaWidth, areaHeight };
        }

        function getGapArea() {
            const split = getEffectArea();
            const visor = getVisorArea();
            const areaX = split.areaX + split.areaWidth;
            const areaY = 0;
            const areaWidth = Math.max(0, visor.areaX - areaX);
            const areaHeight = canvas.height;
            return { areaX, areaY, areaWidth, areaHeight };
        }

        // Mảng lưu các ô vuông/dải đang chạy
        const squares = [];
        let lastTime = performance.now();
        const rowCooldowns = []; // lưu thời điểm spawn gần nhất của từng hàng
        let rowCursor = 0; // dùng để quay vòng qua tất cả các hàng

        function createSquare(forbiddenRows) {
            const { areaX, areaY, areaWidth, areaHeight } = getEffectArea();

            const now = performance.now();
            const minRowInterval = 250; // ms, khoảng thời gian tối thiểu giữa 2 vệt cùng hàng

            // Tìm các hàng đủ điều kiện (cooldown đã hết) và không bị cấm
            const candidateRows = [];
            for (let r = 0; r < rows; r++) {
                if (!rowCooldowns[r] || now - rowCooldowns[r] > minRowInterval) {
                    if (!forbiddenRows || forbiddenRows.indexOf(r) === -1) {
                        candidateRows.push(r);
                    }
                }
            }

            if (candidateRows.length === 0) {
                return; // không hàng nào đủ điều kiện, bỏ lượt spawn này
            }

            // Ưu tiên chọn hàng theo vòng quay để mọi hàng (kể cả 2 hàng dưới cùng) đều được dùng
            candidateRows.sort((a, b) => {
                const da = (a - rowCursor + rows) % rows;
                const db = (b - rowCursor + rows) % rows;
                return da - db;
            });

            const rowIndex = candidateRows[0];
            rowCursor = (rowIndex + 1) % rows;
            rowCooldowns[rowIndex] = now;

            // Tính vị trí Y theo 2 vùng: trên (4 hàng) và dưới (6 hàng)
            const halfHeight = areaHeight / 2;
            let baseY;
            let localIndex;
            let rowHeight;

            if (rowIndex < rowsTop) {
                // Nửa trên: 4 hàng
                baseY = areaY;
                localIndex = rowIndex; // 0..3
                rowHeight = halfHeight / rowsTop;
            } else {
                // Nửa dưới: 6 hàng
                baseY = areaY + halfHeight;
                localIndex = rowIndex - rowsTop; // 0..5
                rowHeight = halfHeight / rowsBottom;
            }

            const y = baseY + localIndex * rowHeight + (rowHeight - stripeThickness) / 2;

            const dir = direction === 'Left to Right' ? 1 : -1;
            const startX = dir === 1 ? areaX - squareSize : areaX + areaWidth;

            squares.push({
                x: startX,
                y: y,
                dir: dir
            });

            return rowIndex;
        }

        // Random thời gian xuất hiện dày hơn (80–220ms), mỗi lần spawn tối đa 2 dải
        function scheduleNextSquare() {
            const delay = 80 + Math.random() * 140; // 80–220ms
            setTimeout(() => {
                // dải thứ nhất: không hạn chế ngoài cooldown
                const firstRow = createSquare();

                // dải thứ hai: chỉ tạo nếu tìm được hàng không kề với hàng thứ nhất
                if (typeof firstRow === 'number') {
                    const forbidden = [firstRow];
                    if (firstRow > 0) forbidden.push(firstRow - 1);
                    if (firstRow < rows - 1) forbidden.push(firstRow + 1);
                    createSquare(forbidden);
                }

                scheduleNextSquare();
            }, delay);
        }

        function updateAndDrawSquares() {
            const { areaX, areaY, areaWidth, areaHeight } = getEffectArea();
            ctx.fillStyle = backgroundColor;
            ctx.fillRect(areaX, areaY, areaWidth, areaHeight);

            const now = performance.now();
            const dt = (now - lastTime) / 1000; // giây
            lastTime = now;

            const baseSpeed = speed * 40 * dt; // px/frame phụ thuộc dt

            for (let i = squares.length - 1; i >= 0; i--) {
                const s = squares[i];
                s.x += s.dir * baseSpeed;

                const outLeft = s.x + squareSize < areaX;
                const outRight = s.x > areaX + areaWidth;

                if (outLeft || outRight) {
                    squares.splice(i, 1);
                    continue;
                }

                ctx.fillStyle = squareColor;
                ctx.fillRect(s.x, s.y, squareSize, stripeThickness);
            }
        }

        function generateRandomColor() {
            const hex = Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
            return '#' + hex;
        }

        function hexToRgb(hex) {
            const clean = String(hex || '').replace('#', '');
            if (clean.length !== 6) return { r: 255, g: 0, b: 102 };
            return {
                r: parseInt(clean.slice(0, 2), 16),
                g: parseInt(clean.slice(2, 4), 16),
                b: parseInt(clean.slice(4, 6), 16)
            };
        }

        function updateAndDrawVisor() {
            const { areaX, areaY, areaWidth, areaHeight } = getVisorArea();

            if (areaWidth <= 0 || areaHeight <= 0) {
                return;
            }

            const trailAlpha = Math.max(0, Math.min(1, 1 - visorTrail / 100));
            ctx.globalAlpha = trailAlpha;
            ctx.fillStyle = backgroundColor;
            ctx.fillRect(areaX, areaY, areaWidth, areaHeight);
            ctx.globalAlpha = 1;

            const barSize = Math.max(1, Math.min(visorBarWidth, visorVertical ? areaWidth : areaHeight));
            const move = visorSpeed / 10;
            const rgb = hexToRgb(currentVisorColor);
            const trailStrength = Math.max(0, Math.min(1, visorTrail / 100));
            const tailLength = Math.max(barSize, (visorVertical ? areaWidth : areaHeight) * 0.35 * trailStrength);

            if (visorVertical) {
                if (visorX < areaX || visorX > areaX + areaWidth - barSize) {
                    visorX = areaX;
                    visorNegative = false;
                }

                const dx = visorNegative ? -move : move;
                if (tailLength > 0) {
                    let gx0;
                    let gx1;
                    if (dx >= 0) {
                        gx0 = Math.max(areaX, visorX - tailLength);
                        gx1 = visorX;
                    } else {
                        gx0 = visorX + barSize;
                        gx1 = Math.min(areaX + areaWidth, visorX + barSize + tailLength);
                    }
                    if (gx1 > gx0) {
                        const grad = ctx.createLinearGradient(gx0, areaY, gx1, areaY);
                        if (dx >= 0) {
                            grad.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
                            grad.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},${0.45 * trailStrength})`);
                        } else {
                            grad.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},${0.45 * trailStrength})`);
                            grad.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
                        }
                        ctx.fillStyle = grad;
                        ctx.fillRect(gx0, areaY, gx1 - gx0, areaHeight);
                    }
                }
                ctx.fillStyle = currentVisorColor;
                ctx.fillRect(visorX, areaY, barSize, areaHeight);
                visorX += dx;

                if (visorX >= areaX + areaWidth - barSize) {
                    visorX = areaX + areaWidth - barSize;
                    visorNegative = true;
                    currentVisorColor = visorRandomColors ? generateRandomColor() : visorColor;
                } else if (visorX <= areaX) {
                    visorX = areaX;
                    visorNegative = false;
                    currentVisorColor = visorRandomColors ? generateRandomColor() : visorColor;
                }
            } else {
                if (visorY < areaY || visorY > areaY + areaHeight - barSize) {
                    visorY = areaY;
                    visorNegative = false;
                }

                const dy = visorNegative ? -move : move;
                if (tailLength > 0) {
                    let gy0;
                    let gy1;
                    if (dy >= 0) {
                        gy0 = Math.max(areaY, visorY - tailLength);
                        gy1 = visorY;
                    } else {
                        gy0 = visorY + barSize;
                        gy1 = Math.min(areaY + areaHeight, visorY + barSize + tailLength);
                    }
                    if (gy1 > gy0) {
                        const grad = ctx.createLinearGradient(areaX, gy0, areaX, gy1);
                        if (dy >= 0) {
                            grad.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
                            grad.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},${0.45 * trailStrength})`);
                        } else {
                            grad.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},${0.45 * trailStrength})`);
                            grad.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
                        }
                        ctx.fillStyle = grad;
                        ctx.fillRect(areaX, gy0, areaWidth, gy1 - gy0);
                    }
                }
                ctx.fillStyle = currentVisorColor;
                ctx.fillRect(areaX, visorY, areaWidth, barSize);
                visorY += dy;

                if (visorY >= areaY + areaHeight - barSize) {
                    visorY = areaY + areaHeight - barSize;
                    visorNegative = true;
                    currentVisorColor = visorRandomColors ? generateRandomColor() : visorColor;
                } else if (visorY <= areaY) {
                    visorY = areaY;
                    visorNegative = false;
                    currentVisorColor = visorRandomColors ? generateRandomColor() : visorColor;
                }
            }
        }

        function loop() {
            const gap = getGapArea();
            if (gap.areaWidth > 0) {
                ctx.fillStyle = backgroundColor;
                ctx.fillRect(gap.areaX, gap.areaY, gap.areaWidth, gap.areaHeight);
            }
            updateAndDrawSquares();
            updateAndDrawVisor();
            requestAnimationFrame(loop);
        }

        // Hàm callback để engine có thể cập nhật khi user đổi tham số
        function onsquareColorChanged() {}
        function onbackgroundColorChanged() {}
        function onsquareSizeChanged() {}
        function onspeedChanged() {}
        function onrowsChanged() {}
        function onstripeThicknessChanged() {}
        function ondirectionChanged() {}
        function onvisorColorChanged() {
            currentVisorColor = visorColor;
        }
        function onvisorRandomColorsChanged() {}
        function onvisorSpeedChanged() {}
        function onvisorTrailChanged() {}
        function onvisorBarWidthChanged() {}
        function onvisorVerticalChanged() {
            const { areaX, areaY } = getVisorArea();
            visorX = areaX;
            visorY = areaY;
            visorNegative = false;
        }

        // Khởi động
        const visorArea = getVisorArea();
        visorX = visorArea.areaX;
        visorY = visorArea.areaY;
        scheduleNextSquare();
        loop();
    </script>
</body>
